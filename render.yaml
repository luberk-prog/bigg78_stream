services:
  - type: web
    name: bigg78-stream
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 5000
      - key: VITE_YOUTUBE_API_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
